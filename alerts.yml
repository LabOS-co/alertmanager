groups:
  - name: Node Exp Down
    rules:
    - alert: Prometheus Target Missing
      expr: up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Instance {{ $labels.instance }} down"
        description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minutes."
  
  - name: free disk space
    rules:
    - alert: Free Disk Space (Less Than 15%)
      expr: floor((1 - (windows_logical_disk_free_bytes / windows_logical_disk_size_bytes)) * 100) > 85
      for: 1m
      labels:
        severity: critical
      annotations:
        title: Low free space on {{ $labels.instance }}
        summary: "High Disk Space Usage (instance {{ $labels.instance }})"
        description: "High Disk Space Usage:  {{ $labels.instance }} - {{ $labels.volume }} - {{ $value }}%"       
  
  - name: Services not running
    rules:
    - alert: Services not running
      expr: windows_service_state{state!="running"} == 1
      for: 1s
      labels:
        severity: critical
      annotations:
        summary: "Service not runnning (instance {{ $labels.instance }}) \n"
        description: "Service not runnning: {{ $labels.instance }} - {{ $labels.name }} \n"
        
  - name: memory usage
    rules:
    - alert: Low Memory (Less Than 10%)
      expr: floor((avg by (instance) (windows_os_physical_memory_free_bytes / windows_cs_physical_memory_bytes) * 100)) < 10
      for: 15m
      labels:
        severity: critical
      annotations:
        title: Low Memory on {{ $labels.instance }}
        summary: "High Memory Usage (instance {{ $labels.instance }}) \n"
        description: "Only {{ $value }}% available on {{ $labels.instance }}\n"    
 
  - name: cpu usage
    rules:
    - alert: High Cpu Usage (More Than 90%)
      expr: floor(100 - (avg by (instance) (irate(windows_cpu_time_total{mode="idle" }[5m])) * 100)) > 90
      for: 10m
      labels:
        severity: critical
      annotations:
        title: "High Cpu Usage {{ $labels.instance }}"
        summary: "High Cpu Usage(instance {{ $labels.instance }})"
        description: "High CPU Usage on {{ $labels.instance }} - {{ $value }}%"
        
  - name: DiskWillFillIn4Hours
    rules:
    - alert: Disk Will Fill In 4Hours
      expr: predict_linear(windows_logical_disk_free_bytes[1h], 4 * 3600) < 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Instance {{ $labels.instance }} {{ $labels.volume }} storage running out"
        description: "{{ $labels.instance }} is predicated that the {{ $labels.volume }} will run out at the current rate in under 4 hours."

  - name: FailedNomadJobs
    rules:
    - alert: Nomad Job Failed
      expr: sum (nomad_nomad_job_summary_failed > 0) by (parent_id, task_group)
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "task {{ $labels.task_group }} has failed under job {{ $labels.parent_id }} \n"
        description: "{{ $value }} allocation(s) in {{ $labels.parent_id }} failed! \n"

  - name: NomadJobsRestart
    rules:
    - alert: Nomad Job Is Restarting too many times
      expr: nomad_nomad_job_summary_starting == 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "{{ $labels.instance }}: Check Job {{ $labels.task_group }}"
        description: "{{ $labels.instance }}: Check Job *{{ $labels.task_group }}* \n"

  - name: Linux Instance Alerts
    rules:
      # Disk space below 15%
      - alert: DiskSpaceLow
        expr: 100 - (node_filesystem_free_bytes{mountpoint!="/run",fstype!~"tmpfs|devtmpfs"} / node_filesystem_size_bytes{mountpoint!="/run",fstype!~"tmpfs|devtmpfs"} * 100) < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on instance {{ $labels.instance }}"
          description: "The disk space on instance {{ $labels.instance }} is below 15%."

      # Disk expected to be filled within 4 hours
      - alert: DiskFillImminent
        expr: (node_filesystem_free_bytes{mountpoint!="/run",fstype!~"tmpfs|devtmpfs"} / (rate(node_filesystem_free_bytes{mountpoint!="/run",fstype!~"tmpfs|devtmpfs"}[5m]))) < 4 * 3600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk filling up on instance {{ $labels.instance }}"
          description: "The disk on instance {{ $labels.instance }} is expected to fill up within 4 hours."

      # Memory usage below 10%
      - alert: LowMemoryUsage
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low memory usage on instance {{ $labels.instance }}"
          description: "The memory usage on instance {{ $labels.instance }} is below 10%."

      # CPU usage above 90%
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High CPU usage on instance {{ $labels.instance }}"
          description: "The CPU usage on instance {{ $labels.instance }} is above 90%."

      # Nomad Jobs Restarted more than 1 time in 5 minutes
      - alert: NomadJobRestarts
        expr: increase(nomad_job_restarts[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nomad job restarts exceeded threshold on {{ $labels.job }}"
          description: "The Nomad job {{ $labels.job }} has restarted more than once in the last 5 minutes."

